name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Type check
        run: npx astro check
      - name: Unit tests
        run: npm test
      - name: Build
        env:
          PUBLIC_SITE_URL: https://guardman.cl
          PUBLIC_API_URL: https://guardman.oficinadesarrollo33.workers.dev
        run: npm run build

  deploy:
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Build
        env:
          PUBLIC_SITE_URL: https://guardman.cl
          PUBLIC_API_URL: https://guardman.oficinadesarrollo33.workers.dev
        run: npm run build
      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy --config dist/server/wrangler.json
      - name: Smoke check
        run: |
          sleep 10
          curl -fsSL https://guardman.cl/ | head -c 200
          echo
          curl -fsSL https://guardman.cl/sitemap.xml | head -c 200
